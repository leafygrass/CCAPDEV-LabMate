services:
  mongodb:
    image: mongo:7
    container_name: labmate-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      DATABASE_URL: mongodb://mongodb:27017/LabMateDB
    command: npm run seed:if-empty
    restart: "no"

volumes:
  mongo_data:
